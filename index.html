<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Direct Link Extractor</title>
    <style>
        body { font-family: system-ui; max-width: 600px; margin: 40px auto; padding: 20px; background: #0f172a; color: #f8fafc; }
        input, select, button { padding: 12px; width: 100%; margin-bottom: 15px; border-radius: 6px; border: 1px solid #334155; box-sizing: border-box; }
        input, select { background: #1e293b; color: white; }
        button { background: #3b82f6; color: white; cursor: pointer; font-weight: bold; border: none; }
        button:hover { background: #2563eb; }
        #status { margin-top: 15px; font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>

    <h2>🔗 Raw Media Extractor</h2>
    
    <input type="password" id="ghToken" placeholder="GitHub Personal Access Token (PAT)">
    <input type="text" id="videoUrl" placeholder="Paste Video URL here...">
    
    <label for="resolution" style="display:block; margin-bottom: 5px; font-size: 14px; color: #94a3b8;">Select Quality:</label>
    <select id="resolution">
        <option value="1080p">1080p</option>
        <option value="720p" selected>720p</option>
        <option value="480p">480p</option>
    </select>

    <button onclick="triggerExtraction()">Extract Direct Link</button>

    <div id="status"></div>

    <script>
        // Pre-configured for your specific repository
        const REPO_OWNER = 'waseemsahirofficial2-dev';
        const REPO_NAME = 'direct_yt_downloader';
        const WORKFLOW_ID = 'extract.yml';

        async function triggerExtraction() {
            const token = document.getElementById('ghToken').value;
            const url = document.getElementById('videoUrl').value;
            const res = document.getElementById('resolution').value;
            const statusDiv = document.getElementById('status');
            
            if(!token || !url) {
                alert("Please provide both your token and the target video URL.");
                return;
            }

            statusDiv.innerText = "🚀 Dispatched run to GitHub Actions...";

            const dispatchRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/${WORKFLOW_ID}/dispatches`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({
                    ref: 'main', // Explicitly targeting your main branch
                    inputs: { 
                        video_url: url,
                        resolution: res
                    }
                })
            });

            if (!dispatchRes.ok) {
                statusDiv.innerText = "❌ Verification failed. Verify your token permissions and ensure it has 'workflow' and 'repo' scopes.";
                console.error("HTTP Error:", dispatchRes.status);
                return;
            }

            statusDiv.innerText = "✅ Workflow successfully triggered! Check your GitHub Actions tab to view the run and grab the URL.";
        }
    </script>
</body>
</html>
