name: Direct Link Extractor

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Single Video URL to Extract'
        required: true
        type: string
      resolution:
        description: 'Target Video Resolution'
        required: true
        default: '720p'
        type: choice
        options:
          - '1080p'
          - '720p'
          - '480p'

jobs:
  extract-url:
    runs-on: ubuntu-latest
    outputs:
      direct_url: ${{ steps.extract.outputs.direct_url }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Cloudflare WARP
        run: |
          curl https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ focal main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

      - name: Connect WARP
        run: |
          sudo warp-cli --accept-tos registration new
          sudo warp-cli --accept-tos mode warp
          sudo warp-cli --accept-tos connect
          sleep 5

      - name: Install Dependencies
        run: pip install yt-dlp

      - name: Load Cookies
        env:
          XHS_COOKIES: ${{ secrets.XHS_COOKIES }}
        run: |
          if [ -n "$XHS_COOKIES" ]; then
            echo "$XHS_COOKIES" > cookies.txt
          fi

      - name: Run Extractor
        id: extract
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          RESOLUTION: ${{ github.event.inputs.resolution }}
        run: python -u extractor.py
